; Loaded via PHPRC by the integration-test runs (see README). Child
; PHP processes spawned by the test framework (its own setup:install)
; inherit PHPRC, so these settings reach them too — unlike -d flags
; on the phpunit process.
memory_limit = -1

; bougie's MariaDB listens on a Unix socket. With db-host "localhost",
; mysqlnd takes the socket path from these inis (expanded from the
; environment `bougie run` injects), and the patched test framework
; (see patches/) passes the same path to its mariadb CLI shell-outs.
pdo_mysql.default_socket = ${BOUGIE_SERVICE_MARIADB_SOCKET}
mysqli.default_socket = ${BOUGIE_SERVICE_MARIADB_SOCKET}
